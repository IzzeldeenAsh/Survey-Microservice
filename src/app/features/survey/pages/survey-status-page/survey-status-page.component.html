<section class="mx-auto max-w-[704px] py-20">
  <article class="rounded-[16px] border border-[#E5ECF5] bg-white p-6 sm:p-8">
    <p class="text-[12px] font-semibold uppercase tracking-[0.08em] text-[#98A2B3]">
      {{ eyebrow() }}
    </p>

    <div
      class="mt-4 inline-flex rounded-md border px-3 py-1 text-[10px] font-semibold uppercase tracking-[0.08em]"
      [class]="badgeClasses()"
    >
      {{ badge() }}
    </div>

    <h1 class="mt-6 text-[30px] font-semibold leading-tight text-[#1F2937] sm:text-[36px]">
      {{ title() }}
    </h1>

    <p class="mt-4 text-[16px] leading-7 text-[#667085]">
      {{ description() }}
    </p>

    @if (hasPrimaryAction() || hasSecondaryAction()) {
      <div class="mt-8 flex flex-wrap gap-3">
        @if (hasPrimaryAction()) {
          <a
            [routerLink]="primaryActionHref()!"
            class="inline-flex items-center justify-center rounded-[10px] border border-[#DCE4EE] bg-white px-4 py-3 text-[15px] font-medium text-[#344054] no-underline"
          >
            {{ primaryActionLabel() }}
          </a>
        }

        @if (hasSecondaryAction()) {
          <a
            [routerLink]="secondaryActionHref()!"
            class="inline-flex items-center justify-center rounded-[10px] border border-[#DCE4EE] bg-white px-4 py-3 text-[15px] font-medium text-[#344054] no-underline"
          >
            {{ secondaryActionLabel() }}
          </a>
        }
      </div>
    }
  </article>
</section>
